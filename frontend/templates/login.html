<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Plagiarism Checker</title>
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/statics/style.css">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <!-- Login Step 1 (Default) -->
            <div id="loginStep1">
                <div class="card-header">
                    <div class="brand-illustration">
                        <img src="/statics/plagiarism_logo.svg" alt="Plagiarism Checker" class="main-illustration" style="height: 120px; width: auto;">
                    </div>
                    <h1 id="authTitle">Log In to your account</h1>
                </div>

                <div class="card-body">
                    <div id="loginError" class="auth-error" style="display: none;"></div>

                    <!-- Login Form -->
                    <form id="loginForm" class="auth-form">
                        <input type="hidden" name="action" value="login">
                        <div class="input-field">
                            <input type="email" id="email" name="email" required placeholder=" ">
                            <label for="email">Email</label>
                        </div>

                        <div class="input-field">
                            <input type="password" id="password" name="password" required placeholder=" ">
                            <label for="password">Password</label>
                            <button type="button" class="password-toggle" onclick="togglePassword()">
                                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            </button>
                        </div>

                        <div class="forgot-link">
                            <a href="#" onclick="showForgotModal()">Forgot password?</a>
                        </div>

                        <button type="submit" class="btn-primary">Log In</button>
                    </form>

                    <!-- Signup Form (Initially Hidden) -->
                    <form id="signupForm" class="auth-form" style="display: none;" action="/signup" method="POST">
                        <div class="input-field">
                            <input type="text" id="regName" name="name" required placeholder=" ">
                            <label for="regName">Full Name</label>
                        </div>
                        <div class="input-field">
                            <input type="email" id="regEmail" name="email" required placeholder=" ">
                            <label for="regEmail">Email</label>
                        </div>
                        <div class="input-field">
                            <input type="password" id="regPassword" name="password" required placeholder=" ">
                            <label for="regPassword">Password</label>
                        </div>
                        <button type="submit" class="btn-primary">Create Account</button>
                    </form>

                    <div class="divider">
                        <span>OR</span>
                    </div>

                    <button type="button" class="btn-google" onclick="showGooglePicker()">
                        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                        <span>Continue with Google</span>
                    </button>

                    <div class="card-footer" id="authFooter">
                        <span id="authPrompt">Don't have an account?</span>
                        <a href="#" id="toggleLink" onclick="toggleAuthMode(event)">Sign up</a>
                    </div>
                </div>
            </div>

    </div>

    <!-- Forgot Password Modal -->
    <div id="forgotModal" class="modal-overlay" style="display: none; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);">
        <div class="google-modal" style="padding: 40px; background: var(--bg-card); border-radius: 24px; border: 1px solid var(--silver-border); width: 100%; max-width: 400px; box-shadow: var(--shadow-premium);">
            <div id="forgotStep1">
                <h2 style="color: var(--text-primary); margin-bottom: 12px; font-weight: 700;">Reset Password</h2>
                <p style="color: var(--text-secondary); margin-bottom: 25px; font-size: 0.95rem;">Enter your email and new password to reset.</p>
                <div id="forgotError" class="auth-error" style="display: none; margin-bottom: 20px;"></div>
                <div class="input-field" style="margin-bottom: 20px;">
                    <input type="email" id="forgotEmail" style="background: transparent; border-color: var(--silver-border); color: white;" required placeholder=" ">
                    <label for="forgotEmail" style="background: var(--bg-card); color: var(--text-secondary);">Email</label>
                </div>
                <div class="input-field" style="margin-bottom: 25px;">
                    <input type="password" id="resetNewPassword" style="background: transparent; border-color: var(--silver-border); color: white;" required placeholder=" ">
                    <label for="resetNewPassword" style="background: var(--bg-card); color: var(--text-secondary);">New Password</label>
                </div>
                <button onclick="handleDirectReset()" class="btn-primary">Reset Password</button>
            </div>
        </div>
    </div>

    <!-- Google Picker Modal (Mock) -->
    <div id="googlePicker" class="modal-overlay" style="display: none; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);">
        <div class="google-modal" style="background: var(--bg-card); border-radius: 24px; border: 1px solid var(--silver-border); box-shadow: var(--shadow-premium); overflow: hidden;">
            <div class="google-logo-header" style="background: rgba(255,255,255,0.02); padding: 30px; border-bottom: 1px solid var(--silver-border);">
                <svg width="24" height="24" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                <span style="color: var(--text-primary); font-weight: 600; font-size: 1.1rem; margin-top: 10px;">Choose an account</span>
            </div>
            <div class="account-list" id="dynamicAccountList" style="padding: 10px 0;">
                <!-- Populated dynamically by javascript -->
            </div>
        </div>
    </div>

    <script>
        function saveAccountToLocalStorage(email, name) {
            let accounts = JSON.parse(localStorage.getItem('saved_accounts')) || [];
            const existing = accounts.find(a => a.email === email);
            if (!name && existing) name = existing.name;
            if (!name) name = email.split('@')[0];
            
            accounts = accounts.filter(a => a.email !== email);
            accounts.unshift({ email, name });
            localStorage.setItem('saved_accounts', JSON.stringify(accounts));
        }
        
        function togglePassword() {
            const passInput = document.getElementById('password');
            const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passInput.setAttribute('type', type);
        }

        function toggleAuthMode(e) {
            if (e) e.preventDefault();
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const authTitle = document.getElementById('authTitle');
            const authPrompt = document.getElementById('authPrompt');
            const toggleLink = document.getElementById('toggleLink');
            const loginError = document.getElementById('loginError');

            loginError.style.display = 'none';

            if (loginForm.style.display !== 'none') {
                // Switch to Signup
                loginForm.style.display = 'none';
                signupForm.style.display = 'flex';
                signupForm.style.flexDirection = 'column';
                signupForm.style.gap = '20px';
                authTitle.innerText = 'Create an account';
                authPrompt.innerText = 'Already have an account?';
                toggleLink.innerText = 'Log in';
            } else {
                // Switch to Login
                loginForm.style.display = 'flex';
                loginForm.style.flexDirection = 'column';
                loginForm.style.gap = '20px';
                signupForm.style.display = 'none';
                authTitle.innerText = 'Log In to your account';
                authPrompt.innerText = "Don't have an account?";
                toggleLink.innerText = 'Sign up';
            }
        }

        // Check for mode=signup in URL
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'signup') {
                toggleAuthMode();
            }
        });

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const errorDiv = document.getElementById('loginError');
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                if (data.status === 'success') {
                    saveAccountToLocalStorage(formData.get('email'), '');
                    window.location.href = data.redirect;
                } else if (data.status === 'error') {
                    errorDiv.innerText = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = "Something went wrong. Please try again.";
                errorDiv.style.display = 'block';
            }
        };

        document.getElementById('signupForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const errorDiv = document.getElementById('loginError'); // Use common error div
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.redirected) {
                    saveAccountToLocalStorage(formData.get('email'), formData.get('name'));
                    window.location.href = response.url;
                } else {
                    const data = await response.json();
                    if (data.status === 'error') {
                        errorDiv.innerText = data.message;
                        errorDiv.style.display = 'block';
                    }
                }
            } catch (err) {
                errorDiv.innerText = "Sign up failed. Please try again.";
                errorDiv.style.display = 'block';
            }
        };

        function showForgotModal() { document.getElementById('forgotModal').style.display = 'flex'; }
        
        async function handleDirectReset() {
            const email = document.getElementById('forgotEmail').value;
            const newPassword = document.getElementById('resetNewPassword').value;
            const errorDiv = document.getElementById('forgotError');
            errorDiv.style.display = 'none';
            
            const formData = new FormData();
            formData.append('email', email);
            formData.append('new_password', newPassword);
            
            try {
                const response = await fetch('/forgot-password', { method: 'POST', body: formData });
                const data = await response.json();
                
                if (data.status === 'success') {
                    alert("Password reset successful! Please log in.");
                    window.location.reload();
                } else {
                    errorDiv.innerText = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (err) {
                errorDiv.innerText = "Reset failed. Please try again.";
                errorDiv.style.display = 'block';
            }
        }

        function showGooglePicker() {
            const listDiv = document.getElementById('dynamicAccountList');
            let accounts = JSON.parse(localStorage.getItem('saved_accounts')) || [];
            
            let html = '';
            if (accounts.length > 0) {
                accounts.forEach(acc => {
                    const initial = acc.name.charAt(0).toUpperCase();
                    html += `
                        <div class="account-item" style="padding: 15px 30px;" onclick="googleLogin('${acc.email}', '${acc.name}')">
                            <div class="acc-avatar" style="background: var(--brand-gradient);">${initial}</div>
                            <div class="acc-info">
                                <span class="acc-name" style="color: var(--text-primary);">${acc.name}</span>
                                <span class="acc-email" style="color: var(--text-secondary);">${acc.email}</span>
                            </div>
                        </div>
                    `;
                });
            } else {
                html += `
                    <div style="padding: 20px 30px; text-align: center; color: var(--text-secondary); font-size: 0.9rem;">
                        No accounts saved on this device. Sign in manually below.
                    </div>
                `;
            }

            html += `
                <div class="account-item separator" style="padding: 15px 30px; border-top: 1px solid var(--silver-border);" onclick="closeGooglePickerAndShowManual()">
                    <div class="acc-avatar plus" style="border-color: var(--text-secondary); color: var(--text-secondary);">+</div>
                    <div class="acc-info">
                        <span class="acc-name" style="color: var(--text-primary);">Use another account</span>
                    </div>
                </div>
            `;
            listDiv.innerHTML = html;
            document.getElementById('googlePicker').style.display = 'flex';
        }

        function closeGooglePickerAndShowManual() {
            document.getElementById('googlePicker').style.display = 'none';
            if (document.getElementById('loginForm').style.display === 'none') {
                toggleAuthMode();
            }
            const emailInput = document.getElementById('email');
            emailInput.focus();
            // Flash the email input container to draw mobile user attention
            if(emailInput.parentElement) {
                const origBoxShadow = emailInput.parentElement.style.boxShadow;
                emailInput.parentElement.style.transition = 'box-shadow 0.3s ease';
                emailInput.parentElement.style.boxShadow = '0 0 0 2px var(--accent-primary)';
                setTimeout(() => { emailInput.parentElement.style.boxShadow = origBoxShadow; }, 800);
            }
        }

        function googleLogin(email, name) {
            saveAccountToLocalStorage(email, name);
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = '/signup';
            
            const nameInput = document.createElement('input');
            nameInput.type = 'hidden';
            nameInput.name = 'name';
            nameInput.value = name;

            const emailInput = document.createElement('input');
            emailInput.type = 'hidden';
            emailInput.name = 'email';
            emailInput.value = email;
            
            const passInput = document.createElement('input');
            passInput.type = 'hidden';
            passInput.name = 'password';
            passInput.value = 'google-auth-sync';
            
            form.appendChild(nameInput);
            form.appendChild(emailInput);
            form.appendChild(passInput);
            document.body.appendChild(form);
            form.submit();
        }

        window.onclick = function(event) {
            const googleModal = document.getElementById('googlePicker');
            const forgotModal = document.getElementById('forgotModal');
            if (event.target == googleModal) googleModal.style.display = 'none';
            if (event.target == forgotModal) forgotModal.style.display = 'none';
        }
    </script>
</body>
</html>
